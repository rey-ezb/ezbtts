name: Build Dashboard Snapshot

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m unittest tests.test_upload_helpers tests.test_file_replacement tests.test_export_dashboard_snapshot -v

      - name: Build snapshot
        run: python deployment/export_dashboard_snapshot.py

      - name: Upload snapshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-snapshot
          path: web_dashboard/data/snapshot
